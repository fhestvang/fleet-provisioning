---
# Codify spark's GPU / serving user services so they are reproducible from git.
# Idempotent: installs the unit files and enables them, but never restarts a
# running service, so applying this never disrupts live vLLM / headroom.
- name: Ensure user systemd unit directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/systemd/user"
    state: directory
    mode: "0755"

- name: Install user service units
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ ansible_env.HOME }}/.config/systemd/user/{{ item }}"
    mode: "0644"
  loop:
    - vllm-coder-30b.service
    - vllm-122b-nvfp4.service
    - vllm@.service
    - headroom-proxy.service
    - github-actions-runner-fos.service
  notify: reload user systemd

# Enable (so they come back after a reboot) without --now, i.e. no restart of
# anything currently running. Only the services meant to be always-on.
- name: Enable always-on services (no restart)
  ansible.builtin.systemd:
    name: "{{ item }}"
    scope: user
    enabled: true
  loop:
    - headroom-proxy.service
    - github-actions-runner-fos.service
    - vllm-coder-30b.service
