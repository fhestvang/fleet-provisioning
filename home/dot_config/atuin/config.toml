style = "compact"
search_mode = "fuzzy"
filter_mode = "global"
workspaces = true
secrets_filter = true
enter_accept = false
# vim-navigable history popup: opens in insert to type, Esc -> normal for j/k.
keymap_mode = "vim-insert"
# search box at the top, results reading downward.
invert = true
# render as a ~20-line popup near the prompt, not a full-screen takeover.
inline_height = 20
# drop the moving 1..9 shortcut numbers beside each result.
show_numeric_shortcuts = false
# fleet-wide history via the hosted, end-to-end-encrypted sync server.
auto_sync = true
sync_frequency = "5m"
sync_address = "https://api.atuin.sh"

[sync]
records = true

# Cohesive Catppuccin Mocha palette (matches the rest of the setup), instead of
# the default red/green duration noise. Theme file: themes/catppuccin-mocha.toml.
[theme]
name = "catppuccin-mocha"
